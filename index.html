<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Cronache del mondo, del vento e del corvo</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<<script src="turn.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(circle, #1a1a1a, #000);
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}
#intro img {
  width: 300px;
  animation: fadeIn 2s forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}
#book { display: block; visibility: hidden; position: absolute; }
.page {
 background: #f5e6c8;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
}
.page img { max-width: 95%; max-height: 95%; object-fit: contain; }
.cover img { object-fit: cover; width: 100%; height: 100%; }
.page-section {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 1rem;
}
.section-title {
  color: #cbb78f;
  font-family: 'IM Fell English', serif;
  font-size: 2rem;
  text-align: center;
}
.section-divider {
  width: 60px;
  height: 1px;
  background: #cbb78f;
  opacity: 0.4;
}
#status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #cbb78f;
  font-family: 'IM Fell English', serif;
  font-size: 14px;
  opacity: 0.7;
  pointer-events: none;
  z-index: 100;
}
#nav-prev, #nav-next {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(203,183,143,0.15);
  border: 1px solid rgba(203,183,143,0.3);
  color: #cbb78f;
  font-family: 'IM Fell English', serif;
  font-size: 2rem;
  width: 48px;
  height: 80px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 100;
  border-radius: 4px;
  transition: background 0.2s;
  user-select: none;
}
#nav-prev { left: 16px; }
#nav-next { right: 16px; }
#nav-prev:hover, #nav-next:hover {
  background: rgba(203,183,143,0.3);
}
</style>
</head>
<body>

<div id="intro">
  <img src="images/copertina.png" alt="Copertina">
</div>

<div id="book"></div>
<div id="status"></div>
<div id="nav-prev">&#8249;</div>
<div id="nav-next">&#8250;</div>
<audio id="flipSound" src="audio/flip.mp3" preload="auto"></audio>

<script>
const CHAPTERS = [
  { name: "Gruppo",   from:   2, to:  15 },
  { name: "Appunti",  from:  16, to:  40 },
  { name: "Racconto", from:  41, to: 100 },
  { name: "Studio",   from: 101, to: 140 },
];

const IMG_FOLDER  = "images/";
const IMG_EXT     = ".webp";
const INTRO_DELAY = 2500;

const book   = $("#book");
const status = $("#status");
let   pages  = [];
let   done   = false;

setTimeout(() => {
  $("#intro").fadeOut(1000, () => startBook());
}, INTRO_DELAY);

function startBook() {
  status.text("Caricamento in corso...");
  loadAllChapters(0);
}

function loadAllChapters(idx) {
  if (idx >= CHAPTERS.length) {
    buildBook();
    return;
  }
  const ch = CHAPTERS[idx];
  pages.push({ type: "section", name: ch.name });
  loadRange(ch.from, ch.to, () => loadAllChapters(idx + 1));
}

function loadRange(current, max, onDone) {
  if (current > max) { onDone(); return; }
  const num = String(current).padStart(2, "0");
  const src = `${IMG_FOLDER}${num}${IMG_EXT}`;
  const img = new Image();
  img.onload = () => {
    pages.push({ type: "image", src });
    status.text(`Caricamento: ${num}${IMG_EXT}`);
    loadRange(current + 1, max, onDone);
  };
  img.onerror = () => {
    loadRange(current + 1, max, onDone);
  };
  img.src = src;
}

function buildBook() {
  if (done) return;
  done = true;

  const imageCount = pages.filter(p => p.type === "image").length;
  if (imageCount === 0) {
    status.text("Nessuna immagine trovata.");
    return;
  }

  status.text("Preparazione libro...");

  book.append(`
    <div class="page cover">
      <img src="images/copertina.png" alt="Copertina">
    </div>
  `);

  pages.forEach(p => {
    if (p.type === "section") {
      book.append(`
        <div class="page">
          <div class="page-section">
            <div class="section-divider"></div>
            <div class="section-title">${p.name}</div>
            <div class="section-divider"></div>
          </div>
        </div>
      `);
    } else {
      book.append(`
        <div class="page">
          <img src="${p.src}" alt="">
        </div>
      `);
    }
  });

  book.append(`
    <div class="page">
      <div class="page-section">
        <div class="section-divider"></div>
        <div class="section-title" style="font-size:1.2rem;">Fine del tomo</div>
        <div class="section-divider"></div>
      </div>
    </div>
  `);

  /* turn.js vuole dimensioni reali — prima rendiamo visibile il book */
  const W = window.innerWidth  * 0.9;
  const H = window.innerHeight * 0.9;
  book.css({ width: W, height: H, visibility: "visible", position: "relative" });

  setTimeout(() => {
    book.turn({
      width:      W,
      height:     H,
      autoCenter: true,
      display:    "double",
      elevation:  80,
      gradients:  true,
      when: {
        turning() {
          const s = document.getElementById("flipSound");
          s.currentTime = 0;
          s.play().catch(() => {});
        }
      }
    });

    status.text("");
    $("#nav-prev, #nav-next").css("display", "flex");
    $("#nav-prev").on("click", () => book.turn("previous"));
    $("#nav-next").on("click", () => book.turn("next"));

    $(document).on("keydown", e => {
      if (e.key === "ArrowRight" || e.key === "PageDown") book.turn("next");
      if (e.key === "ArrowLeft"  || e.key === "PageUp")  book.turn("previous");
    });

  }, 500);
}

$(window).on("resize", () => {
  if (!book.data("turn")) return;
  book.turn("size", window.innerWidth * 0.9, window.innerHeight * 0.9);
});
</script>
</body>
</html>
