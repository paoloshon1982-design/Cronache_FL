<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Cronache del mondo, del vento e del corvo</title>

<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1a1a, #000);
  overflow: hidden;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#intro img {
  width: 300px;
  transform: scale(0.8);
  opacity: 0;
  animation: fadeIn 2s forwards, pulse 4s infinite;
}

@keyframes fadeIn {
  to { opacity: 1; transform: scale(1); }
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* LIBRO */
#book {
  width: 90vw;
  height: 90vh;
  margin: auto;
  display: none;
}

/* PAGINE */
.page {
  background: url("textures/parchment.jpg");
  background-size: cover;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
}

.page img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* COPERTINA */
.cover img {
  object-fit: cover;
}

/* SIMBOLO */
.symbol {
  position: absolute;
  bottom: 20px;
  opacity: 0.7;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="images/copertina.jpg">
</div>

<div id="book"></div>
<audio id="flipSound" src="audio/flip.mp3"></audio>

<script>
const book = $("#book");
const MAX_PAGES = 50;

/* INTRO → AVVIO */
setTimeout(() => {
  $("#intro").fadeOut(1000, () => {
    $("#book").fadeIn(1000);
    startBook();
  });
}, 3000);

/* COSTRUZIONE LIBRO */
function startBook() {

  /* COPERTINA */
  book.append(`
    <div class="page cover">
      <img src="images/copertina.jpg">
    </div>
  `);

  loadImages();
}

/* LOAD IMMAGINI */
let loaded = 0;

function loadImages() {
  for (let i = 1; i <= MAX_PAGES; i++) {
    const num = String(i).padStart(2, '0');
    const src = `images/${num}.jpg`;

    const img = new Image();

    img.onload = () => {
      addPage(src);
      loaded++;
    };

    img.onerror = () => {
      if (loaded > 0) initBook();
    };

    img.src = src;
  }
}

/* AGGIUNTA PAGINA */
function addPage(src) {
  const page = $("<div class='page' />");
  const img = $("<img>").attr("src", src);

  page.append(img);

  /* simbolo animato leggero */
  const symbol = $("<div class='symbol'>🪶</div>");
  page.append(symbol);

  book.append(page);
}

/* INIT */
function initBook() {

  book.append(`
    <div class="page">
      <div style="color:#cbb78f; font-family:IM Fell English;">Fine del tomo</div>
    </div>
  `);

  $("#book").turn({
    width: window.innerWidth * 0.9,
    height: window.innerHeight * 0.9,
    autoCenter: true,
    display: "double",
    elevation: 80,
    gradients: true,
    when: {
      turning: function() {
        document.getElementById("flipSound").play();
      }
    }
  });
}

/* RESPONSIVE */
$(window).resize(() => {
  if ($("#book").data("turn")) {
    $("#book").turn("size", window.innerWidth * 0.9, window.innerHeight * 0.9);
  }
});
</script>

</body>
</html>
