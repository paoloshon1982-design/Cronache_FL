<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Cronache del mondo, del vento e del corvo</title>

<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1a1a, #000);
  overflow: hidden;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#intro img {
  width: 300px;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

/* LIBRO */
#book {
  width: 90vw;
  height: 90vh;
  margin: auto;
  display: none;
}

/* PAGINE */
.page {
  background: url("textures/parchment.jpg");
  background-size: cover;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
}

.page img {
  max-width: 95%;
  max-height: 95%;
  object-fit: contain;
}

/* COPERTINA */
.cover img {
  object-fit: cover;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="images/copertina.jpg">
</div>

<div id="book"></div>
<audio id="flipSound" src="audio/flip.mp3"></audio>

<script>
const book = $("#book");
const MAX_PAGES = 100;

/* AVVIO INTRO */
setTimeout(() => {
  $("#intro").fadeOut(1000, () => {
    $("#book").fadeIn(1000);
    startBook();
  });
}, 2500);

/* COSTRUZIONE LIBRO */
function startBook() {

  /* COPERTINA */
  book.append(`
    <div class="page cover">
      <img src="images/copertina.jpg">
    </div>
  `);

  loadImages();
}

/* CARICAMENTO IMMAGINI */
let pagesLoaded = 0;

function loadImages() {
  for (let i = 1; i <= MAX_PAGES; i++) {

    const num = String(i).padStart(2, '0');
    const src = `images/${num}.webp`; // 🔥 GIÀ CORRETTO

    const img = new Image();

    img.onload = () => {
      addPage(src);
      pagesLoaded++;
    };

    img.onerror = () => {
      // quando non trova più immagini, avvia il libro
      if (pagesLoaded > 0) initBook();
    };

    img.src = src;
  }
}

/* AGGIUNTA PAGINA */
function addPage(src) {
  const page = $("<div class='page' />");
  const img = $("<img>").attr("src", src);

  page.append(img);
  book.append(page);
}

/* AVVIO FLIPBOOK */
function initBook() {

  book.append(`
    <div class="page">
      <div style="color:#cbb78f; font-family:IM Fell English;">
        Fine del tomo
      </div>
    </div>
  `);

  $("#book").turn({
    width: window.innerWidth * 0.9,
    height: window.innerHeight * 0.9,
    autoCenter: true,
    display: "double",
    elevation: 80,
    gradients: true,
    when: {
      turning: function() {
        document.getElementById("flipSound").play();
      }
    }
  });
}

/* RESPONSIVE */
$(window).resize(() => {
  if ($("#book").data("turn")) {
    $("#book").turn("size", window.innerWidth * 0.9, window.innerHeight * 0.9);
  }
});
</script>

</body>
</html>
