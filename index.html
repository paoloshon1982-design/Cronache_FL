<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Cronache del mondo, del vento e del corvo</title>

<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1a1a, #000);
  overflow: hidden;
}

/* LIBRO */
#book {
  width: 90vw;
  height: 90vh;
  margin: auto;
}

/* PAGINE */
.page {
  background: url("textures/parchment.jpg");
  background-size: cover;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
  border: 1px solid rgba(80,60,30,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* IMMAGINI */
.page img {
  max-width: 95%;
  max-height: 95%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.page img.loaded {
  opacity: 1;
}

/* INCISIONE PROFONDA */
.engraved-deep {
  font-family: 'IM Fell English', serif;
  font-size: 2.6em;
  color: #2a1a10;
  letter-spacing: 2px;
  text-align: center;

  text-shadow:
    3px 3px 2px rgba(0,0,0,0.95),
    -1px -1px 1px rgba(255,220,150,0.05);

  transform: rotate(-0.8deg);
}

/* COPERTINA */
.cover {
  background: #1b120b;
}
</style>
</head>

<body>

<div id="book"></div>
<audio id="flipSound" src="audio/flip.mp3"></audio>

<script>

/* ===== CONFIG ===== */
const MAX_PAGES = 50; // puoi aumentarlo quanto vuoi

const book = $("#book");

/* ===== COPERTINA ===== */
book.append(`
  <div class="page cover">
    <div class="engraved-deep">
      ${wrapText("Cronache del mondo, del vento e del corvo")}
    </div>
  </div>
`);

/* ===== CARICAMENTO AUTOMATICO IMMAGINI ===== */
let loadedImages = 0;

function loadImages() {
  for (let i = 1; i <= MAX_PAGES; i++) {
    const num = String(i).padStart(2, '0');
    const src = `images/${num}.jpg`;

    const img = new Image();

    img.onload = function() {
      addPage(src);
      loadedImages++;
    };

    img.onerror = function() {
      // smette quando non trova più immagini
      if (loadedImages > 0) initBook();
    };

    img.src = src;
  }
}

/* ===== AGGIUNTA PAGINA ===== */
function addPage(src) {
  const page = $("<div class='page' />");
  const img = $("<img />").attr("src", src);

  img.on("load", function() {
    $(this).addClass("loaded");
  });

  page.append(img);
  book.append(page);
}

/* ===== INIZIALIZZA LIBRO ===== */
function initBook() {
  book.append(`
    <div class="page">
      <div class="engraved-deep">Fine del tomo</div>
    </div>
  `);

  $("#book").turn({
    width: window.innerWidth * 0.9,
    height: window.innerHeight * 0.9,
    autoCenter: true,
    display: "double",
    elevation: 80,
    gradients: true,
    when: {
      turning: function() {
        document.getElementById("flipSound").play();
      }
    }
  });
}

/* ===== UTIL ===== */
function wrapText(text) {
  return text.split("").map(l => `<span>${l}</span>`).join("");
}

/* START */
loadImages();

/* RESPONSIVE */
$(window).resize(function() {
  if ($("#book").data("turn")) {
    $("#book").turn("size", window.innerWidth * 0.9, window.innerHeight * 0.9);
  }
});

</script>

</body>
</html>
